    }

    }

        transform: translateY(12px);

      to {

        transform: translateY(0);
      }
    }

    @keyframes nodePulse {
      0%, 100% {

      }
      50% {
        transform: scale(1.03);
        box-shadow: 0 0 0 12px rgba(44, 110, 158, 0);

      to {
        stroke-dashoffset: -84;

    }

    function PathologyPatchGallery({ preview = null, title = "病理 Patch 缩略图", desc = "随当前病例切换同步刷新真实 patch 图片" }) {

      if (!items.length) {

      const mappedCount = preview?.mapped_attention_count || 0;

      return (
        <SoftCard className="p-5">
          <SectionTitle
            title={title}
            desc={`${desc}，共 ${preview.slide_count || 0} 张切片 / ${preview.patch_image_count || 0} 个 patch，已映射 ${mappedCount} 个注意力热区`}

              return (
                <figure key={`${item.slide_id}-${item.patch_row}-${index}`} className="overflow-hidden rounded-2xl border border-borderline bg-white">
                  <div className="aspect-square bg-slate-100">
                    <img
                      src={item.url || item.image_url}
                      alt={`${item.slide_id} patch ${item.patch_row}`}
                      className="h-full w-full object-cover"
                      loading="lazy"
                    />
                  </div>
                  <figcaption className="space-y-2 px-3 py-3">
                    <div className="flex items-center justify-between gap-2">
                      <span className={`rounded-full px-2.5 py-1 text-[11px] font-semibold ${

                          : "bg-slate-100 text-slate-600"

                    </p>
                    <p className="text-xs text-slate-500">
                      {hasAttention ? `attention ${(item.attention * 100).toFixed(3)}%` : `X${item.x ?? "-"} / Y${item.y ?? "-"}`}

                </figure>

    function FeaturePackageUploadCard({ className = "" } = {}) {
      const [uploadSpec, setUploadSpec] = useState(null);
      const [uploadResult, setUploadResult] = useState({
        status: "idle",
        text: "请选择预处理后的 JSON 特征包，系统会调用同一个后端模型完成推断。"
      });

      useEffect(() => {
        let cancelled = false;
        fetchJSON("/api/upload-spec")
          .then((data) => {
            if (!cancelled) setUploadSpec(data);
          })
          .catch(() => {
            if (!cancelled) setUploadSpec(null);
          });
        return () => {
          cancelled = true;
        };
      }, []);

      const handleFeaturePackageUpload = async (event) => {
        const file = event.target.files?.[0];
        if (!file) {
          return;
        }
        setUploadResult({ status: "loading", text: `正在读取 ${file.name}...` });
        try {
          const payload = JSON.parse(await file.text());
          const result = await fetch(`${API_BASE}/api/predict-uploaded`, {
            method: "POST",
            headers: { "Content-Type": "application/json", Accept: "application/json" },
            body: JSON.stringify(payload)
          });
          const data = await result.json();
          if (!result.ok) {
            throw new Error(data.error || "上传失败");
          }
          setUploadResult({
            status: "success",
            text: `${data.patient_id} 推断完成：DFS代理敏感 ${data.sensitivity_score}%，复发/耐药风险 ${data.resistance_score}%`
          });
        } catch (error) {
          setUploadResult({
            status: "error",
            text: error.message || "特征包格式不符合接口要求"
          });
        } finally {
          event.target.value = "";
        }
      };

      const specRows = uploadSpec?.required_fields
        ? [
            ["接口", `${uploadSpec.method || "POST"} ${uploadSpec.endpoint || "/api/predict-uploaded"}`],
            ["病理patch特征", uploadSpec.required_fields.image_patch_features],
            ["RNA-seq特征", uploadSpec.required_fields.gene_profile],
            ["患者结构化特征", uploadSpec.required_fields.patient_features]
          ]
        : [["接口状态", "等待后端返回上传规范"]];

      return (
        <SoftCard className={`p-5 ${className}`}>
          <SectionTitle title="新患者特征包上传" desc="单独接入新病例的预处理特征包，上传后直接调用后端模型推断" />
          <div className="grid gap-5 xl:grid-cols-[1fr,1.2fr]">
            <label className="flex min-h-[260px] cursor-pointer flex-col items-center justify-center rounded-2xl border border-dashed border-borderline bg-surface px-5 py-8 text-center transition hover:border-medical hover:bg-blue-50">
              <Icon name="upload-cloud" className="h-10 w-10 text-medical" />
              <span className="mt-4 text-base font-semibold text-brand">选择 JSON 特征包</span>
              <span className="mt-3 max-w-md text-sm leading-7 text-slate-500">
                这里不上传原始 WSI、MRI 或 RNA-seq 大文件，只接收已经预处理好的模型输入特征。
              </span>
              <input type="file" accept="application/json,.json" className="hidden" onChange={handleFeaturePackageUpload} />
            </label>

            <div>
              <div className="grid gap-3">
                {specRows.map(([label, value]) => (
                  <div key={label} className="rounded-2xl border border-borderline bg-white px-4 py-3">
                    <p className="text-xs font-semibold text-slate-400">{label}</p>
                    <p className="mt-1 break-all text-sm leading-6 text-brand">{value}</p>
                  </div>
                ))}
              </div>
              <div className={`mt-4 rounded-2xl px-4 py-4 text-sm leading-7 ${
                uploadResult.status === "success"
                  ? "bg-emerald-50 text-emerald-700"
                  : uploadResult.status === "error"
                    ? "bg-amber-50 text-amber-700"
                    : uploadResult.status === "loading"
                      ? "bg-slate-100 text-slate-700"
                      : "bg-blue-50 text-blue-700"
              }`}>
                {uploadResult.text}
              </div>
              {uploadSpec?.note ? (
                <div className="mt-4 rounded-2xl border border-amber-100 bg-amber-50 px-4 py-3 text-sm leading-7 text-amber-800">
                  {uploadSpec.note}
                </div>
              ) : null}
            </div>
          </div>
        </SoftCard>
      );
    }

              <div className="space-y-3">

    function PredictionPage({ currentPatient = focusPatient, prediction = null, subtype = null, mriEvidence = null, prognosis = null } = {}) {

          <div className="grid gap-6 xl:grid-cols-[1.3fr,1fr]">

              <ProgressRing value={resistanceValue} title="耐药风险" subtitle="复发/耐药代理方向的模型概率" color="#67A9D1" />

            <SoftCard className="p-5">

              <div className="mt-5 space-y-4">
                {dynamicSummary.map((text) => (

          {mriEvidence ? (

          {prognosis ? (

          ) : null}

          <div className="mt-6 grid gap-6 xl:grid-cols-[1.2fr,1fr,1fr]">
            <SoftCard className="p-5">
              <SectionTitle title="多模态贡献" desc="决定当前预测结果的主要来源" />
              <div className="space-y-5">
                {contributionItems.map((item, index) => (
                  <InlineProgress

                ))}
              </div>
            </SoftCard>

            <SoftCard className="p-5">
              <SectionTitle title="促进敏感性的信号" desc="支撑高应答评分的核心依据" />
              <div className="space-y-4">
                {dynamicPositiveSignals.map((text) => (
                  <div key={text} className="rounded-2xl border border-emerald-200 bg-emerald-50 px-4 py-4 text-sm leading-7 text-emerald-700">
                    {text}

                ))}

            </SoftCard>

            <SoftCard className="p-5">

          {pathologyPreview?.items?.length ? (

              <PathologyPatchGallery

                title="病理 Patch 缩略图"

              />

          ) : prediction?.top_patch_attention ? (
            <div className="mt-6">
              <SoftCard className="p-5">
                <SectionTitle title="病理 Patch 注意力" desc="后端返回了注意力 row，但当前没有可展示的 patch 图片" />
                <div className="grid gap-3 sm:grid-cols-2 xl:grid-cols-5">
                  {prediction.top_patch_attention.slice(0, 10).map((item) => (
                    <div key={item.patch_row} className="rounded-2xl border border-borderline bg-surface px-4 py-3">
                      <p className="text-xs uppercase tracking-[0.16em] text-slate-400">Patch Row</p>
                      <p className="mt-2 text-lg font-bold text-brand">{item.patch_row}</p>
                      <p className="mt-1 text-xs text-slate-500">attention {(item.attention * 100).toFixed(3)}%</p>
                    </div>
                  ))}
                </div>
              </SoftCard>
            </div>
          ) : null}
        </>
      );
    }

    function SubtypingPage({ subtype = null, summary = null } = {}) {
      const cards = subtype?.cards?.length ? subtype.cards : subtypeCards;
      const rows = subtype?.heatmapRows?.length ? subtype.heatmapRows : heatmapRows;

      const conclusions = subtype?.conclusions?.length

          <div className="grid gap-6 md:grid-cols-2 xl:grid-cols-4">

                  <div className="grid grid-cols-[120px_repeat(4,minmax(110px,1fr))] gap-3">
                    <div></div>
                    {heatmapColumns.map((name) => (
                      <div key={name} className="rounded-2xl bg-slate-100 px-4 py-3 text-center text-sm font-semibold text-brand">

    function RecommendationPage({ recommendation = null } = {}) {

    function GraphPage({ graph = null } = {}) {
      const [selectedNodeId, setSelectedNodeId] = useState("patient");
      const nodes = graph?.nodes?.length ? graph.nodes : graphNodes;
      const edges = graph?.edges?.length ? graph.edges : graphEdges;
      const nodeMap = useMemo(() => {
        return nodes.reduce((acc, node) => {
          acc[node.id] = node;
          return acc;
        }, {});
      }, [nodes]);

      useEffect(() => {
        if (nodes.length && !nodeMap[selectedNodeId]) {
          setSelectedNodeId(nodes[0].id);
        }
      }, [nodes, nodeMap, selectedNodeId]);

      const currentNode = nodeMap[selectedNodeId] || nodes[0] || {};
      const relatedEdges = edges.filter(([source, target]) => source === currentNode.id || target === currentNode.id);
      const relationRows = edges
        .map(([source, target, label]) => ({
          source: nodeMap[source],
          target: nodeMap[target],
          label
        }))
        .filter((item) => item.source && item.target);
      const evidenceLayer = ["patient", "pathology", "gene", "mri", "patient_feature"].map((id) => nodeMap[id]).filter(Boolean);
      const reasoningLayer = ["subtype", "attention"].map((id) => nodeMap[id]).filter(Boolean);
      const outputLayer = ["sensitivity", "plan"].map((id) => nodeMap[id]).filter(Boolean);
      const graphLayers = [
        { title: "证据输入层", desc: "病例、病理、RNA-seq、MRI和患者结构化特征", items: evidenceLayer },
        { title: "模型推理层", desc: "TNBC筛选和多模态注意力融合", items: reasoningLayer },
        { title: "临床输出层", desc: "DFS代理敏感性和方案路径", items: outputLayer }
      ];
      const pathIds = ["patient", "pathology", "gene", "mri", "patient_feature", "subtype", "attention", "sensitivity", "plan"];
      const reasoningPath = pathIds.map((id) => nodeMap[id]).filter(Boolean);
      const selectedIndex = reasoningPath.findIndex((node) => node.id === currentNode.id);

      return (
        <>
          <PageHeader
            title="知识图谱可视化"
            subtitle="把当前病例、多模态证据、三阴性筛选、DFS代理敏感性和治疗建议放进同一张推理图谱里，展示系统如何从数据证据走到临床路径。"
            right={
              <>
                <TinyInfo label="节点数" value={nodes.length} />
                <TinyInfo label="关系数" value={edges.length} />
                <TinyInfo label="核心推理" value={graph?.reasoning || "TNBC筛选 -> DFS代理 -> 方案"} />
                <TinyInfo label="当前节点" value={currentNode.label || "患者"} />
              </>
            }
          />

          <div className="grid gap-4 md:grid-cols-3">
            {graphLayers.map((layer) => (
              <SoftCard key={layer.title} className="p-5">
                <div className="flex items-start justify-between gap-3">
                  <div>
                    <h3 className="text-lg font-semibold text-brand">{layer.title}</h3>
                    <p className="mt-2 text-sm leading-6 text-slate-500">{layer.desc}</p>
                  </div>
                  <StatusPill tone="info">{layer.items.length} 节点</StatusPill>
                </div>
                <div className="mt-4 flex flex-wrap gap-2">
                  {layer.items.map((node) => (
                    <button
                      key={node.id}
                      type="button"
                      onClick={() => setSelectedNodeId(node.id)}
                      className={`rounded-full px-3 py-1.5 text-xs font-semibold transition ${
                        currentNode.id === node.id
                          ? "bg-brand text-white"
                          : "border border-borderline bg-white text-slate-600 hover:border-medical hover:text-medical"
                      }`}
                    >
                      {node.label}
                    </button>
                  ))}
                </div>
              </SoftCard>
            ))}
          </div>

          <div className="grid gap-6 xl:grid-cols-[1.6fr,1fr]">
            <SoftCard className="p-5">
              <SectionTitle title="当前病例推理图谱" desc="点击节点查看证据含义；灰色 MRI 节点表示该病例缺失，不会伪造参与预测" />
              <div className="force-canvas relative h-[520px] overflow-hidden rounded-[28px] border border-borderline">
                <svg className="absolute inset-0 h-full w-full">
                  {edges.map(([source, target, label]) => {
                    const from = nodeMap[source];
                    const to = nodeMap[target];
                    if (!from || !to) {
                      return null;
                    }
                    const labelX = (from.x + to.x) / 2;
                    const labelY = (from.y + to.y) / 2;
                    return (
                      <g key={`${source}-${target}`}>
                        <line
                          x1={`${from.x}%`}
                          y1={`${from.y}%`}
                          x2={`${to.x}%`}
                          y2={`${to.y}%`}
                          className="connection-line"
                          style={{ opacity: currentNode.id === source || currentNode.id === target ? 0.9 : 0.38 }}
                        ></line>
                        <text
                          x={`${labelX}%`}
                          y={`${labelY}%`}
                          fill="#456784"
                          fontSize="11"
                          textAnchor="middle"
                          dominantBaseline="central"
                        >
                          {label}
                        </text>
                      </g>
                    );
                  })}
                </svg>
                {nodes.map((node) => (
                  <button
                    key={node.id}
                    type="button"
                    onClick={() => setSelectedNodeId(node.id)}
                    className={`absolute w-32 -translate-x-1/2 -translate-y-1/2 rounded-3xl bg-gradient-to-br ${node.color} px-4 py-4 text-center text-white shadow-soft transition duration-300 ${

              <div className="grid gap-4 md:grid-cols-2 xl:grid-cols-3">

                  <div key={item.name} className="rounded-2xl border border-borderline bg-surface px-4 py-4">
                    <p className="text-sm font-semibold text-brand">{item.name}</p>
                    <p className="mt-2 text-sm leading-7 text-slate-600">{item.meaning}</p>

              />

              <SoftCard className="p-5">

                      <p className="mt-2 text-lg font-bold text-brand">{item.patch_row}</p>

    function SettingsPage({
      summary = null,
      apiStatus = "static",
      currentPatient = focusPatient,
      mriSummary = null,
      patients = [],
      prediction = null
    } = {}) {
      const defaultConfig = useMemo(() => ({
        threshold: 0.55,
        subtypeConfidence: 0.70,
        treatmentThreshold: 0.55,
        autoSync: true,
        explainMode: true,
        knowledgeGraph: true,
        autoReport: true
      }), []);
      const [config, setConfig] = useState(() => {
        try {
          const stored = window.localStorage.getItem("tnbcSystemSettings");
          return stored ? { ...defaultConfig, ...JSON.parse(stored) } : defaultConfig;
        } catch (error) {
          return defaultConfig;
        }
      });
      const [savedAt, setSavedAt] = useState(() => {
        try {
          return window.localStorage.getItem("tnbcSystemSettingsSavedAt") || "尚未保存";
        } catch (error) {
          return "尚未保存";
        }
      });
      const [health, setHealth] = useState(null);
      const [uploadSpec, setUploadSpec] = useState(null);

      useEffect(() => {
        let cancelled = false;
        fetchJSON("/api/health")
          .then((data) => {
            if (!cancelled) setHealth(data);
          })
          .catch(() => {
            if (!cancelled) setHealth(null);
          });
        fetchJSON("/api/upload-spec")
          .then((data) => {
            if (!cancelled) setUploadSpec(data);
          })
          .catch(() => {
            if (!cancelled) setUploadSpec(null);
          });
        return () => {
          cancelled = true;
        };
      }, []);

      const backendModelVersion = summary?.model_version || prediction?.model_version || health?.model_run || "后端未连接";
      const backendArchitecture = summary?.architecture || prediction?.architecture || "待加载";
      const labelCounts = summary?.label_counts || {};
      const splitCounts = summary?.split_counts || {};
      const serverStatusLabel = apiStatus === "connected" ? "后端已连接" : apiStatus === "loading" ? "正在连接" : "接口异常";
      const serverStatusTone = apiStatus === "connected" ? "success" : apiStatus === "loading" ? "warn" : "slate";
      const modelReady = health?.model === true || Boolean(summary?.model_version);
      const datasetReady = health?.dataset === true || Boolean(summary?.graph_count);

      const saveConfig = () => {
        const stamp = new Date().toLocaleString("zh-CN", { hour12: false });
        try {
          window.localStorage.setItem("tnbcSystemSettings", JSON.stringify(config));
          window.localStorage.setItem("tnbcSystemSettingsSavedAt", stamp);
        } catch (error) {
          // localStorage may be unavailable in restricted browsers; UI still updates.
        }
        setSavedAt(stamp);
      };

      const resetConfig = () => {
        try {
          window.localStorage.removeItem("tnbcSystemSettings");
          window.localStorage.setItem("tnbcSystemSettingsSavedAt", "已恢复默认");
        } catch (error) {
          // Keep the reset usable even when storage is blocked.
        }
        setConfig(defaultConfig);
        setSavedAt("已恢复默认");
      };

      const toggleField = (field) => {
        setConfig((prev) => ({ ...prev, [field]: !prev[field] }));
      };

      const runtimeRows = [
        ["API服务", serverStatusLabel, serverStatusTone],
        ["前端文件", health?.frontend ? "已加载" : "等待检测", health?.frontend ? "success" : "warn"],
        ["图数据集", datasetReady ? "已加载" : "等待检测", datasetReady ? "success" : "warn"],
        ["模型权重", modelReady ? "已加载" : "等待检测", modelReady ? "success" : "warn"],
        ["当前病例", currentPatient.id || summary?.default_patient_id || "待选择", "info"]
      ];

      const cohortRows = [
        ["图样本", `${summary?.graph_count || health?.patient_count || patients.length || 0} 例`],
        ["病理切片", `${summary?.slide_count || 0} 张`],
        ["DFS敏感代理 label 0", `${labelCounts["0"] || 0} 例`],
        ["复发耐药代理 label 1", `${labelCounts["1"] || 0} 例`],
        ["训练 / 验证 / 测试", `${splitCounts.train || 0} / ${splitCounts.val || 0} / ${splitCounts.test || 0}`],
        ["MRI资产 / 对齐 / 特征", `${mriSummary?.mri_patient_count || summary?.mri_patient_count || 0} / ${mriSummary?.aligned_packed_patient_count || summary?.mri_aligned_patient_count || 0} / ${mriSummary?.feature_patient_count || summary?.mri_feature_patient_count || 0}`]
      ];

      const uploadRows = uploadSpec?.required_fields
        ? [
            ["接口", `${uploadSpec.method || "POST"} ${uploadSpec.endpoint || "/api/predict-uploaded"}`],
            ["病理patch特征", uploadSpec.required_fields.image_patch_features],
            ["RNA-seq特征", uploadSpec.required_fields.gene_profile],
            ["患者结构化特征", uploadSpec.required_fields.patient_features]
          ]
        : [["接口状态", "等待后端返回上传规范"]];

      return (
        <>
          <PageHeader
            title="系统设置"
            subtitle="连接当前后端模型、数据资产与本地报告配置；页面信息直接来自系统接口和浏览器持久化设置。"
            right={
              <>
                <TinyInfo label="后端状态" value={serverStatusLabel} />
                <TinyInfo label="主模型" value={backendArchitecture} />
                <TinyInfo label="运行目录" value={backendModelVersion} />
                <TinyInfo label="最近保存" value={savedAt} />
              </>
            }
          />

          <div className="grid gap-6 xl:grid-cols-[1.35fr,1fr]">
            <div className="grid gap-6">
              <SoftCard className="p-5">
                <SectionTitle title="后端运行状态" desc="来自 /api/summary、/api/health 与当前病例联动数据" />
                <div className="grid gap-4 md:grid-cols-2 xl:grid-cols-4">
                  <HighlightTile label="当前模型" value={backendModelVersion} tone="dark" />
                  <HighlightTile label="网络结构" value={backendArchitecture} tone="blue" />
                  <HighlightTile label="队列样本" value={`${summary?.patient_count || health?.patient_count || patients.length || 0}例`} />
                  <HighlightTile label="当前病例" value={currentPatient.id || "待选择"} />
                </div>

                <div className="mt-5 overflow-hidden rounded-2xl border border-borderline bg-white">
                  {runtimeRows.map(([label, value, tone]) => (
                    <div key={label} className="flex flex-wrap items-center justify-between gap-3 border-b border-borderline px-4 py-3 last:border-b-0">
                      <span className="text-sm font-medium text-slate-600">{label}</span>
                      <StatusPill tone={tone}>{value}</StatusPill>
                    </div>
                  ))}
                </div>

                <div className="mt-5 grid gap-3 md:grid-cols-2">
                  <div className="rounded-2xl border border-borderline bg-surface px-4 py-4">
                    <p className="text-xs font-semibold uppercase tracking-[0.2em] text-slate-400">MODEL CHECKPOINT</p>
                    <p className="mt-2 break-all text-sm font-semibold text-brand">runs/{backendModelVersion}/model.pt</p>
                  </div>
                  <div className="rounded-2xl border border-borderline bg-surface px-4 py-4">
                    <p className="text-xs font-semibold uppercase tracking-[0.2em] text-slate-400">PACKED DATASET</p>
                    <p className="mt-2 break-all text-sm font-semibold text-brand">tnbc_multimodal_dataset.pt</p>
                  </div>
                </div>
              </SoftCard>

              <SoftCard className="p-5">
                <SectionTitle title="报告阈值配置" desc="阈值用于前端分层、报告显示和筛选提示；真实推理概率仍来自后端模型输出" />
                <div className="rounded-2xl border border-blue-100 bg-blue-50/60 px-4 py-3 text-sm leading-7 text-blue-800">
                  当前模型权重不在浏览器里热切换；如果要换模型，需要后端重新加载对应 run 目录。这里保存的是系统展示口径与报告偏好。
                </div>

                <div className="mt-6 space-y-6">
                  {[
                    ["threshold", "化疗敏感性分层阈值", "敏感概率达到该阈值后，报告中进入高敏感提示。"],
                    ["subtypeConfidence", "TNBC筛选置信度阈值", "ER-/PR-/HER2- 证据达到该阈值后，前端标记为三阴性已筛出。"],
                    ["treatmentThreshold", "方案推荐触发阈值", "综合敏感性或耐药风险达到阈值后，治疗建议卡片给出重点提示。"]
                  ].map(([key, label, note]) => (
                    <div key={key}>
                      <div className="mb-2 flex items-center justify-between gap-4">
                        <span className="text-sm font-medium text-slate-600">{label}</span>
                        <span className="text-sm font-semibold text-brand">{config[key].toFixed(2)}</span>
                      </div>
                      <input
                        type="range"
                        min="0.50"
                        max="0.95"
                        step="0.01"
                        value={config[key]}
                        onChange={(e) => setConfig((prev) => ({ ...prev, [key]: Number(e.target.value) }))}
                        className="w-full accent-medical"
                      />
                      <p className="mt-2 text-xs leading-6 text-slate-500">{note}</p>
                    </div>
                  ))}
                </div>

                <div className="mt-8 flex flex-wrap gap-3">
                  <button
                    onClick={saveConfig}
                    className="rounded-full bg-brand px-5 py-3 text-sm font-semibold text-white transition hover:bg-medical"
                  >
                    保存配置
                  </button>
                  <button
                    onClick={resetConfig}
                    className="rounded-full border border-borderline bg-white px-5 py-3 text-sm font-semibold text-slate-600 transition hover:border-medical hover:text-medical"
                  >
                    恢复默认
                  </button>
                </div>
              </SoftCard>
            </div>

            <div className="grid gap-6">
              <SoftCard className="p-5">
                <SectionTitle title="真实数据资产" desc="当前系统已经读取到的队列规模与MRI接入状态" />
                <div className="space-y-3">
                  {cohortRows.map(([label, value]) => (
                    <div key={label} className="flex items-center justify-between gap-4 rounded-2xl border border-borderline bg-surface px-4 py-3">
                      <span className="text-sm text-slate-500">{label}</span>
                      <span className="text-right text-sm font-semibold text-brand">{value}</span>
                    </div>
                  ))}
                </div>
              </SoftCard>

              <SoftCard className="p-5">
                <SectionTitle title="本地偏好" desc="保存到本机浏览器，用于记录报告和展示偏好" />
                <div className="space-y-4">
                  {[
                    ["autoSync", "病例切换后同步页面数据"],
                    ["explainMode", "报告优先展示可解释性结果"],
                    ["knowledgeGraph", "报告优先展示知识图谱关系"],
                    ["autoReport", "病例页报告下载入口偏好"]
                  ].map(([key, label]) => (
                    <button
                      key={key}
                      onClick={() => toggleField(key)}
                      className="flex w-full items-center justify-between gap-4 rounded-2xl border border-borderline bg-surface px-4 py-4 text-left transition hover:border-medical"
                    >
                      <span className="text-sm font-medium text-slate-600">{label}</span>
                      <span className={`inline-flex shrink-0 rounded-full px-3 py-1 text-xs font-semibold ${config[key] ? "bg-blue-50 text-blue-700" : "bg-slate-200 text-slate-600"}`}>
                        {config[key] ? "已开启" : "已关闭"}
                      </span>
                    </button>
                  ))}
                </div>
              </SoftCard>

              <SoftCard className="p-5">
                <SectionTitle title="新患者接口规范" desc="后端真实提供的上传入口，不接收未经预处理的原始文件" />
                <div className="space-y-3">
                  {uploadRows.map(([label, value]) => (
                    <div key={label} className="rounded-2xl border border-borderline bg-white px-4 py-3">
                      <p className="text-xs font-semibold text-slate-400">{label}</p>
                      <p className="mt-1 break-all text-sm leading-6 text-brand">{value}</p>
                    </div>
                  ))}
                </div>
                {uploadSpec?.note ? (
                  <div className="mt-4 rounded-2xl border border-amber-100 bg-amber-50 px-4 py-3 text-sm leading-7 text-amber-800">
                    {uploadSpec.note}
                  </div>
                ) : null}
              </SoftCard>
            </div>
          </div>
        </>
      );
    }

    function App() {
      const initialPage = (() => {
        const page = new URLSearchParams(window.location.search).get("page");
        return navItems.some((item) => item.id === page) ? page : "dashboard";
      })();
      const [activePage, setActivePage] = useState(initialPage);
      const [menuOpen, setMenuOpen] = useState(false);
      const [now, setNow] = useState(new Date());
      const [liveData, setLiveData] = useState({
        apiStatus: "loading",
        focusPatient,
        summaryCards,
        historyCases,
        summary: null,
        prediction: null,
        patients: [],
        selectedPatientId: "",
        mriSummary: null,
        subtype: null,
        recommendation: null,
        knowledgeGraph: null,
        explain: null,
        mriEvidence: null,
        prognosis: null,
        outcomeSummary: null,
        isLoadingCase: false
      });

      useEffect(() => {
        const timer = setInterval(() => setNow(new Date()), 60000);
        return () => clearInterval(timer);
      }, []);

      useEffect(() => {
        const url = new URL(window.location.href);
        if (activePage === "dashboard") {
          url.searchParams.delete("page");
        } else {
          url.searchParams.set("page", activePage);
        }
        window.history.replaceState(null, "", `${url.pathname}${url.search}${url.hash}`);
      }, [activePage]);

      useEffect(() => {
        let cancelled = false;
        fetchJSON("/api/ui")
          .then((data) => {
            if (!cancelled) {
              setLiveData({
                apiStatus: data.apiStatus || "connected",
                focusPatient: data.focusPatient || focusPatient,
                summaryCards: data.summaryCards || summaryCards,
                historyCases: data.historyCases || historyCases,
                summary: data.summary || null,
                prediction: data.prediction || null,
                patients: data.patients || [],
                selectedPatientId: data.focusPatient?.id || data.summary?.default_patient_id || "",
                mriSummary: data.mriSummary || null,
                subtype: data.subtype || null,
                recommendation: data.recommendation || null,
                knowledgeGraph: data.knowledgeGraph || null,
                explain: data.explain || null,
                mriEvidence: data.mriEvidence || null,
                prognosis: data.prognosis || null,
                outcomeSummary: data.outcomeSummary || data.summary?.outcome_summary || null,
                isLoadingCase: false
              });
            }
          })
          .catch(() => {
            if (!cancelled) {
              setLiveData((prev) => ({ ...prev, apiStatus: "static" }));
            }
          });
        return () => {
          cancelled = true;
        };
      }, []);

      const loadPatient = async (patientId) => {
        if (!patientId || patientId === liveData.selectedPatientId) {
          return;
        }
        setLiveData((prev) => ({ ...prev, selectedPatientId: patientId, isLoadingCase: true }));
        try {
          const data = await fetchJSON(`/api/case/${encodeURIComponent(patientId)}`);
          setLiveData((prev) => ({
            ...prev,
            apiStatus: "connected",
            selectedPatientId: patientId,
            focusPatient: data.focusPatient || prev.focusPatient,
            prediction: data.prediction || prev.prediction,
            subtype: data.subtype || prev.subtype,
            recommendation: data.recommendation || prev.recommendation,
            knowledgeGraph: data.knowledgeGraph || prev.knowledgeGraph,
            explain: data.explain || prev.explain,
            mriEvidence: data.mriEvidence || prev.mriEvidence,
            prognosis: data.prognosis || prev.prognosis,
            isLoadingCase: false
          }));
        } catch (error) {
          setLiveData((prev) => ({ ...prev, apiStatus: "error", isLoadingCase: false }));
        }
      };

      useEffect(() => {
        if (window.feather && typeof window.feather.replace === "function") {
          window.feather.replace();
        }
      }, [activePage, menuOpen, now, liveData.selectedPatientId, liveData.isLoadingCase]);

      const activeNav = navItems.find((item) => item.id === activePage);
      const liveFocusPatient = liveData.focusPatient || focusPatient;
      const liveSummaryCards = liveData.summaryCards || summaryCards;
      const liveHistoryCases = liveData.historyCases || historyCases;
      const livePatients = liveData.patients || [];

      const renderPage = () => {
        switch (activePage) {
          case "dashboard":
            return (
              <DashboardPage
                currentPatient={liveFocusPatient}
                cards={liveSummaryCards}
                apiStatus={liveData.apiStatus}
                summary={liveData.summary}
                mriSummary={liveData.mriSummary}
                patients={livePatients}
                selectedPatientId={liveData.selectedPatientId}
                onSelectPatient={loadPatient}
                onOpenPage={setActivePage}
                loading={liveData.isLoadingCase}
                prediction={liveData.prediction}
              />
            );
          case "multimodal":
            return <MultimodalPage summary={liveData.summary} currentPatient={liveFocusPatient} prediction={liveData.prediction} mriSummary={liveData.mriSummary} mriEvidence={liveData.mriEvidence} />;
          case "upload":
            return <NewPatientUploadPage summary={liveData.summary} />;
          case "prediction":
            return <PredictionPage currentPatient={liveFocusPatient} prediction={liveData.prediction} subtype={liveData.subtype} mriEvidence={liveData.mriEvidence} prognosis={liveData.prognosis} />;
          case "subtyping":
            return <SubtypingPage subtype={liveData.subtype} summary={liveData.summary} />;
          case "recommendation":
            return <RecommendationPage recommendation={liveData.recommendation} />;
          case "graph":
            return <GraphPage graph={liveData.knowledgeGraph} />;
          case "explain":
            return <ExplainabilityPage explain={liveData.explain} />;
          case "history":
            return <HistoryPage cases={liveHistoryCases} summary={liveData.summary} />;
          case "settings":
            return <SettingsPage summary={liveData.summary} apiStatus={liveData.apiStatus} currentPatient={liveFocusPatient} mriSummary={liveData.mriSummary} patients={livePatients} prediction={liveData.prediction} />;
          default:
            return <DashboardPage />;
        }
      };

      return (
        <div className="relative min-h-screen overflow-hidden">
          <div className="hero-grid pointer-events-none absolute inset-0 opacity-60"></div>

          {menuOpen && (
            <button
              className="fixed inset-0 z-30 bg-slate-900/35 lg:hidden"
              onClick={() => setMenuOpen(false)}
              aria-label="关闭侧边栏"
            ></button>
          )}

          <div className="relative flex min-h-screen">
            <aside
              className={`fixed inset-y-0 left-0 z-40 w-[290px] transform overflow-y-auto border-r border-white/50 bg-brand px-5 py-6 text-white shadow-soft transition duration-300 custom-scrollbar lg:translate-x-0 ${
                menuOpen ? "translate-x-0" : "-translate-x-full"
              }`}
            >
              <div className="flex items-start justify-between">
                <div>
                  <div className="inline-flex items-center gap-3 rounded-2xl bg-white/10 px-4 py-3">
                    <div className="rounded-2xl bg-white/15 p-2">
                      <Icon name="shield" className="h-5 w-5" />
                    </div>
                    <div>
                      <p className="text-sm font-semibold tracking-[0.16em] text-slate-200">TNBC AI SYSTEM</p>
                      <p className="mt-1 text-lg font-bold">智破三阴</p>
                    </div>
                  </div>
                </div>
                <button
                  className="rounded-xl p-2 text-white/80 transition hover:bg-white/10 lg:hidden"
                  onClick={() => setMenuOpen(false)}
                >
                  <Icon name="x" className="h-5 w-5" />
                </button>
              </div>

              <div className="mt-6 rounded-3xl border border-white/10 bg-white/8 p-4">
                <p className="text-xs uppercase tracking-[0.22em] text-slate-300">演示概览</p>
                <p className="mt-3 text-sm leading-7 text-slate-100/90">
                  基于多模态异构与深度学习的三阴性乳腺癌筛选、化疗敏感性预测与可解释分析系统。
                </p>
              </div>

              <div className="mt-4 rounded-3xl border border-white/10 bg-white/8 p-4 backdrop-blur-xl">
                <div className="flex items-center justify-between gap-3">
                  <div>
                    <p className="text-xs uppercase tracking-[0.22em] text-slate-300">病例焦点</p>
                    <p className="mt-3 text-sm font-semibold text-white">{liveFocusPatient.id}</p>
                    <p className="mt-1 text-xs text-slate-300">{liveFocusPatient.age} | {liveFocusPatient.stage}</p>
                  </div>
                  <span className="rounded-full bg-emerald-500/15 px-3 py-1 text-xs font-semibold text-emerald-200">
                    在线分析
                  </span>
                </div>
                <div className="mt-4 space-y-4">
                  <div>
                    <div className="mb-2 flex items-center justify-between text-xs text-slate-200">
                      <span>多模态完整度</span>
                      <span>{liveFocusPatient.completeness}%</span>
                    </div>
                    <div className="h-2 rounded-full bg-white/10">
                      <div className="h-2 rounded-full bg-gradient-to-r from-cyan-300 to-sky-400" style={{ width: `${liveFocusPatient.completeness}%` }}></div>
                    </div>
                  </div>
                  <div>
                    <div className="mb-2 flex items-center justify-between text-xs text-slate-200">
                      <span>化疗敏感性</span>
                      <span>{liveFocusPatient.sensitivity}%</span>
                    </div>
                    <div className="h-2 rounded-full bg-white/10">
                      <div className="h-2 rounded-full bg-gradient-to-r from-sky-300 to-blue-400" style={{ width: `${liveFocusPatient.sensitivity}%` }}></div>
                    </div>
                  </div>
                </div>
              </div>

              <nav className="mt-6 space-y-2">
                {navItems.map((item, index) => {
                  const active = item.id === activePage;
                  return (
                    <button
                      key={item.id}
                      onClick={() => {
                        setActivePage(item.id);
                        setMenuOpen(false);
                      }}
                      className={`group flex w-full items-center gap-3 rounded-2xl px-4 py-3 text-left transition duration-300 ${
                        active
                          ? "bg-white text-brand shadow-panel"
                          : "text-slate-200 hover:bg-white/10 hover:text-white"
                      }`}
                    >
                      <div className={`rounded-xl p-2 transition ${active ? "bg-blue-50 text-medical" : "bg-white/10 text-slate-200 group-hover:bg-white/15"}`}>
                        <Icon name={item.icon} className="h-4 w-4" />
                      </div>
                      <div className="min-w-0 flex-1">
                        <p className="truncate text-sm font-semibold">{item.label}</p>
                        <p className={`text-xs ${active ? "text-slate-500" : "text-slate-300/80"}`}>模块 {index + 1}</p>
                      </div>
                    </button>
                  );
                })}
              </nav>

              <div className="mt-6 rounded-3xl border border-white/10 bg-gradient-to-br from-white/10 to-white/5 p-4">
                <p className="text-xs uppercase tracking-[0.22em] text-slate-300">系统状态</p>
                <div className="mt-4 space-y-3">
                  {[
                    ["模型在线", liveData.apiStatus === "connected" ? "正常" : "检查中"],
                    ["病例同步", liveData.isLoadingCase ? "刷新中" : "实时"],
                    ["数据来源", liveData.apiStatus === "connected" ? "后端接口" : "静态兜底"]
                  ].map(([label, value]) => (
                    <div key={label} className="flex items-center justify-between text-sm">
                      <span className="text-slate-200/80">{label}</span>
                      <span className="font-semibold text-white">{value}</span>
                    </div>
                  ))}
                </div>
              </div>
            </aside>

            <div className="flex min-h-screen flex-1 flex-col lg:ml-[290px]">
              <header className="sticky top-0 z-20 border-b border-white/60 bg-white/75 backdrop-blur-xl">
                <div className="mx-auto flex max-w-[1800px] items-center justify-between gap-4 px-4 py-4 sm:px-6 lg:px-8">
                  <div className="flex items-center gap-3">
                    <button
                      className="rounded-2xl border border-borderline bg-white p-3 text-brand transition hover:border-medical hover:text-medical lg:hidden"
                      onClick={() => setMenuOpen(true)}
                      aria-label="打开侧边栏"
                    >
                      <Icon name="menu" className="h-5 w-5" />
                    </button>
                    <div>
                      <p className="text-xs uppercase tracking-[0.24em] text-slate-400">智破三阴 | TNBC智能诊疗系统</p>
                      <h2 className="mt-1 text-xl font-bold text-brand">{activeNav ? activeNav.label : "工作台"}</h2>
                    </div>
                  </div>

                  <div className="flex items-center gap-3">
                    <PatientSelector
                      patients={livePatients}
                      selectedPatientId={liveData.selectedPatientId || liveFocusPatient.id}
                      onSelectPatient={loadPatient}
                      loading={liveData.isLoadingCase}
                    />
                    <div className="hidden rounded-2xl border border-borderline bg-white px-4 py-3 sm:block">
                      <p className="text-xs text-slate-400">当前时间</p>
                      <p className="mt-1 text-sm font-semibold text-brand">
                        {now.toLocaleDateString("zh-CN")} {now.toLocaleTimeString("zh-CN", { hour: "2-digit", minute: "2-digit", hour12: false })}
                      </p>
                    </div>
                    <div className="rounded-2xl border border-borderline bg-white px-4 py-3">
                      <p className="text-xs text-slate-400">当前场景</p>
                      <p className="mt-1 text-sm font-semibold text-brand">{liveData.isLoadingCase ? "病例刷新中" : "模型联动模式"}</p>
                    </div>
                  </div>
                </div>
              </header>

              <main className="mx-auto flex w-full max-w-[1800px] flex-1 flex-col px-4 py-6 sm:px-6 lg:px-8">
                {activePage !== "dashboard" ? (
                  <div className="mb-4">
                    <button
                      type="button"
                      onClick={() => setActivePage("dashboard")}
                      className="inline-flex items-center gap-2 rounded-2xl border border-borderline bg-white px-4 py-3 text-sm font-semibold text-brand shadow-panel transition hover:border-medical hover:bg-blue-50 hover:text-medical"
                    >
                      <Icon name="arrow-left" className="h-4 w-4" />
                      返回工作台
                    </button>
                  </div>
                ) : null}
                <div key={activePage} className="page-enter">
                  {renderPage()}
                </div>
              </main>

              <footer className="border-t border-white/60 bg-white/75 px-4 py-4 text-center text-sm text-slate-500 backdrop-blur-xl sm:px-6 lg:px-8">
                扬州大学信息与人工智能学院 | 数据来源：TCGA/GDC/复旦FUDAN-TNBC
              </footer>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
