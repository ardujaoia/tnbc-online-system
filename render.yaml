services:
  - type: web
    name: tnbc-online-system
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python -B scripts/serve_online_system.py --host 0.0.0.0
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: TNBC_ONLINE_PORT
        value: 10000
